<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postpartum Guide</title>

  <!-- Google Fonts: Noto Serif (headlines) + Plus Jakarta Sans (body) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <!-- Material Symbols icon font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS (CDN – replace with a local build for production) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- ─── Design-system tokens ──────────────────────────────────────────── -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            /* Surface hierarchy */
            "surface":                  "#faf9f5",
            "surface-bright":           "#faf9f5",
            "surface-dim":              "#d9dbd5",
            "surface-container-lowest": "#ffffff",
            "surface-container-low":    "#f4f4ef",
            "surface-container":        "#eeeee9",
            "surface-container-high":   "#e8e9e3",
            "surface-container-highest":"#e1e3dd",
            "surface-variant":          "#e1e3dd",
            "surface-tint":             "#466743",
            /* Primary – Sage Green */
            "primary":            "#466743",
            "primary-container":  "#c6edbf",
            "primary-fixed":      "#c6edbf",
            "primary-fixed-dim":  "#b9dfb2",
            "primary-dim":        "#3a5b38",
            "on-primary":         "#eaffe3",
            "on-primary-container": "#395937",
            "on-primary-fixed":   "#274626",
            "on-primary-fixed-variant": "#426340",
            "inverse-primary":    "#ccf3c5",
            /* Secondary – Dusty Rose */
            "secondary":          "#7d554f",
            "secondary-container":"#ffdad4",
            "secondary-fixed":    "#ffdad4",
            "secondary-fixed-dim":"#fdc8c0",
            "secondary-dim":      "#704943",
            "on-secondary":       "#fff7f6",
            "on-secondary-container": "#6e4842",
            "on-secondary-fixed": "#593630",
            "on-secondary-fixed-variant": "#79524b",
            /* Tertiary */
            "tertiary":           "#5d632f",
            "tertiary-container": "#f8ffbc",
            "tertiary-fixed":     "#f8ffbc",
            "tertiary-fixed-dim": "#eaf0af",
            "tertiary-dim":       "#515724",
            "on-tertiary":        "#f8febc",
            "on-tertiary-container": "#5d632f",
            "on-tertiary-fixed":  "#4b501f",
            "on-tertiary-fixed-variant": "#676e39",
            /* Error */
            "error":              "#a73b21",
            "error-container":    "#fd795a",
            "error-dim":          "#791903",
            "on-error":           "#fff7f6",
            "on-error-container": "#6e1400",
            /* Neutral */
            "background":         "#faf9f5",
            "on-background":      "#30332f",
            "on-surface":         "#30332f",
            "on-surface-variant": "#5d605b",
            "outline":            "#797c76",
            "outline-variant":    "#b0b3ad",
            "inverse-surface":    "#0d0f0d",
            "inverse-on-surface": "#9d9d9a",
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg:   "0.5rem",
            xl:   "0.75rem",
            "2xl":"1rem",
            "3xl":"1.5rem",
            full: "9999px",
          },
          fontFamily: {
            headline: ["Noto Serif", "serif"],
            body:     ["Plus Jakarta Sans", "sans-serif"],
            label:    ["Plus Jakarta Sans", "sans-serif"],
          },
        },
      },
    };
  </script>

  <!-- ─── Link to your shared stylesheet (create styles.css next) ───────── -->
  <!-- CHANGE PATH if styles.css moves to a sub-folder, e.g. "css/styles.css" -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Inline base styles (keep minimal – styles.css owns the rest) -->
  <style>
    /* Icon font rendering */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Base typography */
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: max(884px, 100dvh);
    }
    h1, h2, h3 {
      font-family: 'Noto Serif', serif;
    }
  </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">

  <!-- ═══════════════════════════════════════════════════════════════════════
       TOP APP BAR
       Fixed header with glassmorphism as per DESIGN.md "Glass & Gradient Signature"
  ════════════════════════════════════════════════════════════════════════════ -->
  <header
    id="top-bar"
    class="fixed top-0 left-0 w-full z-50
           backdrop-blur-xl
           shadow-[0_1px_0_rgba(48,51,47,0.06)]"
  >
    <div class="flex items-center justify-between px-6 h-20 max-w-2xl mx-auto w-full">

      <!-- Left: Logo + App name -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-primary-container text-primary">
          <span class="material-symbols-outlined" style="font-size:22px;">spa</span>
        </div>
        <div>
          <!-- id="top-bar-title" and id="top-bar-sub" updated by app.js -->
          <p id="top-bar-title" class="text-lg font-semibold tracking-tight text-on-surface font-headline leading-tight">
            Postpartum Guide
          </p>
          <p id="top-bar-sub" class="text-[11px] font-medium text-on-surface-variant uppercase tracking-widest font-body">
            You're not alone
          </p>
        </div>
      </div>

      <!-- Right: User avatar -->
      <!-- CHANGE: Replace the src URL with your own image path, e.g. "images/avatar.jpg"
           or remove this block entirely if you don't need a profile photo -->
      <div class="w-10 h-10 rounded-full overflow-hidden ring-2 ring-primary-fixed ring-offset-2 ring-offset-surface flex-shrink-0">
        <img
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwxhsu3PvdGoGBxdfphPvnd3I6LnilTXectvXkPYs6WryjIenpn0pSDhb2GuP7HRrqfZMZ3_eJ7Xn50oTRZj42YHej5sE7_5mvCdWT5d4FKSky_1cKqq1uiQ7qrmLhY1lnF4Oca0Hkqzqr6KROXQSPM-qGizI1mR7Gdw8RzVpuCyI4rGDSza29EFZFuVR1837l3GbTqp5HsrbQTR693xJoPbHXmEo704B9cIJAHe_nWH0w4mRHx3W1CS1cuAa-RrdqReJFChcVhGqH"
          alt="User profile"
          class="w-full h-full object-cover"
        />
      </div>

    </div>
  </header>


  <!-- ═══════════════════════════════════════════════════════════════════════
       MAIN CONTENT CANVAS
       pt-24  = clears the fixed top bar (80px)
       pb-32  = clears the fixed bottom nav
       JavaScript (app.js) renders content into #app-root
  ════════════════════════════════════════════════════════════════════════════ -->
  <main
    id="main-canvas"
    class="flex-grow max-w-2xl mx-auto w-full"
  >
    <!-- ── App Root ────────────────────────────────────────────────────────
         app.js will inject one of three states into this element:
           • Symptoms list  (loaded from bf_symptom_cards.json)
           • Symptom detail (when a card is tapped)
           • Loading skeleton
           • Error state
         Do not put visible content here – JavaScript owns it.
    ───────────────────────────────────────────────────────────────────────── -->
    <div id="app-root" aria-live="polite"></div>
  </main>


  <!-- ═══════════════════════════════════════════════════════════════════════
       BOTTOM NAVIGATION BAR
       Mobile-first pill nav as per DESIGN.md "Thumb Zone" layout rule.
       On md+ screens Tailwind hides it (md:hidden) – adjust if you want
       desktop nav too.
  ════════════════════════════════════════════════════════════════════════════ -->
  <nav
    id="bottom-nav"
    class="fixed bottom-0 left-0 w-full z-50
           rounded-t-3xl
           backdrop-blur-xl
           shadow-[0_-4px_24px_rgba(48,51,47,0.06)]"
    aria-label="Main navigation"
  >
    <div class="flex justify-around items-center px-4 pt-3 pb-8 max-w-2xl mx-auto">

      <!-- ── Symptoms tab (ACTIVE) ──────────────────────────────────────── -->
      <!-- app.js adds/removes the active styles via data-nav="symptoms" -->
      <button
        id="nav-symptoms"
        data-nav="symptoms"
        aria-label="Symptoms"
        aria-current="page"
        class="flex flex-col items-center justify-center
               bg-primary-container/60 text-primary
               rounded-full px-6 py-2.5
               transition-all duration-300 active:scale-95"
      >
        <span
          class="material-symbols-outlined mb-0.5"
          style="font-variation-settings:'FILL' 1;"
        >health_metrics</span>
        <span class="text-[11px] font-semibold tracking-wide uppercase font-label">Symptoms</span>
      </button>

      <!-- ── Positions tab ─────────────────────────────────────────────── -->
      <button
        id="nav-positions"
        data-nav="positions"
        aria-label="Positions"
        class="flex flex-col items-center justify-center
               text-on-surface-variant
               rounded-full px-6 py-2.5
               transition-all duration-300 active:scale-95"
      >
        <span class="material-symbols-outlined mb-0.5">self_care</span>
        <span class="text-[11px] font-medium tracking-wide uppercase font-label">Positions</span>
      </button>

      <!-- ── Chat tab ───────────────────────────────────────────────────── -->
      <button
        id="nav-more"
        data-nav="more"
        aria-label="Coach"
        class="flex flex-col items-center justify-center
               text-on-surface-variant
               rounded-full px-6 py-2.5
               transition-all duration-300 active:scale-95"
      >
        <span class="material-symbols-outlined mb-0.5">chat</span>
        <span class="text-[11px] font-medium tracking-wide uppercase font-label">Coach</span>
      </button>

    </div>
  </nav>


  <!-- ═══════════════════════════════════════════════════════════════════════
       AMBIENT BACKGROUND GLOWS
       Decorative blobs as per DESIGN.md "Glass & Gradient Signature".
       pointer-events-none so they never block taps.
  ════════════════════════════════════════════════════════════════════════════ -->
  <!-- Light mode: soft sage + rose glows -->
  <!-- Dark mode: these are dimmed further via .dark override in styles.css -->
  <div aria-hidden="true" id="glow-primary"
       class="fixed top-[15%] -left-24 w-80 h-80 rounded-full blur-[120px] pointer-events-none -z-10
              bg-primary-container/15 dark:bg-[#1d3320]/20"></div>
  <div aria-hidden="true" id="glow-secondary"
       class="fixed bottom-[12%] -right-24 w-96 h-96 rounded-full blur-[140px] pointer-events-none -z-10
              bg-secondary-container/10 dark:bg-[#3d2420]/15"></div>


  <!-- ═══════════════════════════════════════════════════════════════════════
       SCRIPTS
       Load app.js last so the DOM is ready.
       CHANGE PATH if app.js moves to a sub-folder, e.g. "js/app.js"
  ════════════════════════════════════════════════════════════════════════════ -->
  <!-- safety.js must load before app.js — app.js calls window.Safety -->
  <script src="safety.js"></script>
  <script src="app.js"></script>

</body>
</html>
